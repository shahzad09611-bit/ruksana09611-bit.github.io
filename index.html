<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>जहां जज्बात रहते हैं</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }

    body {
      height: 100vh;
      background: url('cover.jpg') no-repeat center center/cover;
      position: relative;
      color: #f5d27a;
    }

    /* Dark overlay */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 15, 35, 0.75);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .top-line, .bottom-line {
      position: absolute;
      width: 90%;
      height: 2px;
      background: #f5d27a;
      left: 50%;
      transform: translateX(-50%);
    }

    .top-line {
      top: 20px;
    }

    .bottom-line {
      bottom: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 25px;
      letter-spacing: 2px;
    }

    .intro {
      font-size: 16px;
      line-height: 1.8;
      margin-bottom: 25px;
    }

    .author {
      color: #ffffff;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .btn {
      background: #f4a261;
      color: #0a0f23;
      padding: 12px 25px;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #e76f51;
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 48px;
      }

      h2 {
        font-size: 22px;
      }

      .intro {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="top-line"></div>

  <div class="container">
    
    <h1>जहां जज्बात रहते हैं</h1>
    <h2>PART-1</h2>

    <div class="intro">
      हर दरवाज़े के पीछे<br>
      छुपी होती है एक कहानी…<br>
      कुछ खुशियों की, कुछ दर्द की,<br>
      और कुछ जज्बातों की।<br>
      स्वागत है…<br>
      जहां जज्बात रहते हैं।
    </div>

    <div class="author">Mohammad Shahzad</div>

    <a href="Page1.html" class="btn">Start Reading</a>

  </div>

  <div class="bottom-line"></div>

</body>
</html>
